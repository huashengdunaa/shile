<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 使用国内CDN（cdnjs）替换外部CDN -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0-alpha1/css/bootstrap.min.css" rel="stylesheet">
    <title>固定底部导航栏</title>
    <style>
        /* 确保主要内容有足够的内边距，避免被导航栏遮挡 */
        .main-content {
            padding-bottom: 80px; /* 根据导航栏高度调整 */
            min-height: 100vh;
        }
    </style>
</head>
<body>
<!-- 主要内容 -->
<div class="main-content">
    <div class="container">
        <h1>页面内容</h1>
        <p>这里有很多内容...</p>
        <!-- 大量内容确保页面可滚动 -->
        <div class="" style="height: 300px;background: red">
            <div style="height: 100px;background: aqua">

            </div>
            <div style="height: 100px;background: aqua">

            </div>
        </div>
        <div class="" style="height: 300px;background: red">
            <div style="height: 100px;background: aqua">

            </div>
            <div style="height: 100px;background: aqua">

            </div>
        </div>
        <h1>页面内容</h1>
        <p>这里有很多内容...</p>
    </div>
</div>

<!-- 固定底部导航栏 -->
<nav class="navbar navbar-dark bg-dark " style="position: absolute;height: 400px;width: 300px">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">品牌</a>
        <div class="d-flex">
            <a class="nav-link text-white me-3" href="#">首页</a>
            <a class="nav-link text-white me-3" href="#">关于</a>
            <a class="nav-link text-white" href="#">联系</a>
        </div>
    </div>
</nav>

<!-- 使用国内CDN（cdnjs）替换外部JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0-alpha1/js/bootstrap.bundle.min.js"></script>
</body>
</html>
